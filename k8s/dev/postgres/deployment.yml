apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: n8n-dev
spec:
  serviceName: postgres
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: ankane/pgvector:latest

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: n8n
            - name: POSTGRES_USER
              value: n8n
            - name: POSTGRES_PASSWORD
              value: n8npass

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: data   # ✅ IMPORTANT FIX

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]

        resources:
          requests:
            storage: 10Gi